{% load i18n %}
{% load static %}

<!DOCTYPE html>
<html lang="{% block html_lang %}{{ LANGUAGE_CODE }}{% endblock %}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a5f4a">
    <link rel="icon" href="{% static 'img/favicon.ico' %}" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'img/bukamalu_icon_32.png' %}">
    <link rel="icon" type="image/png" sizes="16x16" href="{% static 'img/bukamalu_icon_16.png' %}">
    <link rel="apple-touch-icon" href="{% static 'img/bukamalu_icon_180.png' %}">
    <link rel="manifest" href="{% static 'img/site.webmanifest' %}">
    <title>{% block title %}Bukamalu{% endblock %}</title>
    <meta name="description" content="{% block meta_description %}{% trans "Share your location with one click. Send a link to see each other on the map." %}{% endblock %}">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Bukamalu">
    <meta property="og:title" content="{% block meta_og_title %}{% trans "Bukamalu – Share your location with one click" %}{% endblock %}">
    <meta property="og:description" content="{% block meta_og_description %}{% trans "Share your location with one click. Send a link to see each other on the map." %}{% endblock %}">
    <meta property="og:url" content="{{ request.scheme }}://{{ request.get_host }}{{ request.path }}">
    {% block meta_og_image %}
    <meta property="og:image" content="{{ request.scheme }}://{{ request.get_host }}{% static 'img/og-preview.png' %}">
    {% endblock %}

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{% block meta_twitter_title %}{% trans "Bukamalu – Share your location with one click" %}{% endblock %}">
    <meta name="twitter:description" content="{% block meta_twitter_description %}{% trans "Share your location with one click. Send a link to see each other on the map." %}{% endblock %}">
    {% block meta_twitter_image %}
    <meta name="twitter:image" content="{{ request.scheme }}://{{ request.get_host }}{% static 'img/og-preview.png' %}">
    {% endblock %}
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    {% block extra_css %}{% endblock %}
    
    <!-- Leaflet JS - loaded in head to ensure availability -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
    <script>
    window.BUKAMALU_API_BASE = (function() {
        var p = window.location.pathname;
        var match = p.match(/^\/[^/]+\//);
        return match ? match[0] : '/';
    })();
    </script>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    
    <script src="{% static 'js/map.js' %}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
